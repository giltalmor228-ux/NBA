<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title or "NBA Playoff Pool" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --ink: #263347;
        --muted: #6a788d;
        --cream: #fbf5ee;
        --cream-strong: #fffaf4;
        --mint: #d9f6ea;
        --sky: #dff2ff;
        --peach: #ffe1cc;
        --orange: #f2875a;
        --orange-dark: #d66945;
        --line: rgba(38, 51, 71, 0.08);
        --shadow: 0 20px 55px rgba(41, 54, 78, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at 14% 18%, rgba(242, 135, 90, 0.18), transparent 18%),
          radial-gradient(circle at 84% 12%, rgba(155, 222, 255, 0.35), transparent 20%),
          radial-gradient(circle at 76% 86%, rgba(192, 240, 221, 0.4), transparent 18%),
          linear-gradient(180deg, #fffaf4 0%, #f7efe4 100%);
      }

      .hero-shell,
      .card-surface {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .card-surface {
        border-radius: 2rem;
        padding: 1.5rem;
      }

      .soft-badge,
      .status-pill,
      .leaderboard-chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-weight: 700;
      }

      .soft-badge {
        background: rgba(255, 255, 255, 0.75);
        padding: 0.55rem 0.95rem;
        color: var(--muted);
      }

      .pill-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        min-height: 3rem;
        border-radius: 999px;
        padding: 0 1.1rem;
        background: var(--orange);
        color: white;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 12px 30px rgba(242, 135, 90, 0.26);
      }

      .pill-link--secondary {
        background: rgba(255, 255, 255, 0.85);
        color: var(--ink);
      }

      .status-pill {
        padding: 0.6rem 0.95rem;
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .status-pill--open {
        background: var(--mint);
        color: #1c6e4c;
      }

      .status-pill--locked {
        background: var(--sky);
        color: #29638b;
      }

      .status-pill--override {
        background: var(--peach);
        color: #8a452a;
      }

      .leaderboard-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        border-radius: 1.7rem;
        background: var(--cream-strong);
        padding: 1rem 1.1rem;
      }

      .leaderboard-row--monkey {
        background: linear-gradient(135deg, rgba(255, 225, 204, 0.9), rgba(255, 250, 244, 0.95));
      }

      .leaderboard-rank {
        display: flex;
        height: 3rem;
        width: 3rem;
        align-items: center;
        justify-content: center;
        border-radius: 1rem;
        background: white;
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--ink);
      }

      .leaderboard-chip {
        padding: 0.5rem 0.8rem;
        background: rgba(255, 255, 255, 0.85);
        color: var(--ink);
      }

      .series-shell {
        border-radius: 1.4rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 250, 244, 0.92));
        border: 1px solid rgba(38, 51, 71, 0.06);
        padding: 0.85rem 0.95rem;
      }

      .series-header {
        display: grid;
        gap: 0.65rem;
        margin-bottom: 0.7rem;
      }

      @media (min-width: 680px) {
        .series-header {
          grid-template-columns: 1fr 1fr;
        }
      }

      .team-pill {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        border-radius: 1.1rem;
        background: white;
        padding: 0.7rem 0.8rem;
      }

      .team-logo {
        height: 2.35rem;
        width: 2.35rem;
        object-fit: contain;
      }

      .prediction-card {
        border-radius: 1.15rem;
        background: white;
        padding: 0.8rem;
      }

      .prediction-title {
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .field-label {
        display: block;
        margin-top: 0.75rem;
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--ink);
      }

      .friendly-input,
      .friendly-select,
      .friendly-textarea,
      .search-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 1.15rem;
        background: #ffffff;
        padding: 0.95rem 1rem;
        font: inherit;
        color: var(--ink);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .friendly-input:focus,
      .friendly-select:focus,
      .friendly-textarea:focus,
      .search-input:focus {
        border-color: rgba(242, 135, 90, 0.5);
        box-shadow: 0 0 0 4px rgba(242, 135, 90, 0.15);
      }

      .friendly-textarea {
        min-height: 7rem;
        resize: vertical;
      }

      .choice-grid {
        display: grid;
        gap: 0.55rem;
        margin-top: 0.65rem;
      }

      .choice-grid--compact {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .choice-card {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 2.55rem;
        border-radius: 0.95rem;
        background: var(--cream);
        cursor: pointer;
        overflow: hidden;
      }

      .choice-card input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .choice-card span {
        padding: 0.55rem 0.7rem;
        font-weight: 700;
        color: var(--ink);
        font-size: 0.92rem;
      }

      .choice-card input:checked + span {
        background: var(--orange);
        color: white;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .choice-card--mini span {
        font-size: 0.88rem;
      }

      .player-grid {
        display: grid;
        gap: 0.7rem;
      }

      @media (min-width: 560px) {
        .player-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .player-choice {
        width: 100%;
        border: 0;
        border-radius: 1.1rem;
        background: var(--cream);
        padding: 0.85rem 0.95rem;
        text-align: left;
        color: var(--ink);
        font-weight: 700;
        cursor: pointer;
      }

      .player-choice--selected {
        background: var(--orange);
        color: white;
      }

      .primary-action,
      .secondary-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3rem;
        border-radius: 999px;
        padding: 0 1.25rem;
        border: 0;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
      }

      .primary-action {
        background: var(--orange);
        color: white;
        box-shadow: 0 12px 30px rgba(242, 135, 90, 0.24);
      }

      .secondary-action {
        background: white;
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .primary-action:disabled,
      .secondary-action:disabled {
        cursor: not-allowed;
        opacity: 0.55;
        box-shadow: none;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <header class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.34em] text-slate-500">NBA Playoff Pool</p>
          <h1 class="mt-3 text-4xl font-black tracking-tight text-slate-900">Clean picks. Clear standings. Built-in recovery.</h1>
        </div>
        <a href="/" class="pill-link pill-link--secondary">Home</a>
      </header>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
