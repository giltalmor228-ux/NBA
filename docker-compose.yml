services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: nba_pool
      POSTGRES_USER: nba
      POSTGRES_PASSWORD: nba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nba -d nba_pool"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://nba:nba@db:5432/nba_pool
      SECRET_KEY: change-me
      NBA_PROVIDER_API_KEY: ""
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
